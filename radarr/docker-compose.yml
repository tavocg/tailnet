services:
  ts-radarr:
    image: tailscale/tailscale:latest
    container_name: ts-radarr
    restart: unless-stopped
    hostname: ${TS_HOSTNAME}
    environment:
      - TS_AUTHKEY
      - TS_EXTRA_ARGS
      - TS_SERVE_CONFIG=/ts/serve.json
    volumes:
      - tailscale:/var/lib/tailscale
    ports:
      - 7878:7878
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    configs:
      - source: ts-config
        target: /ts/serve.json
    networks:
      - arr_network

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: service:ts-radarr
    depends_on:
      - ts-radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Chicago}
    volumes:
      - ${RADARR_CONFIG_DIR:-config}:/config
      - ${RADARR_MOVIES_DIR:-/mnt/storage/media/movies}:/movies
      - ${RADARR_DOWNLOADS_DIR:-/mnt/storage/data/qbittorrent/downloads}:/downloads

volumes:
  tailscale:
  config:

networks:
  arr_network:
    name: arr_network
    external: true

configs:
  ts-config:
    content: |
      {
        "TCP": {
          "443": {
            "HTTPS": true
          }
        },
        "Web": {
          "$${TS_CERT_DOMAIN}:443": {
            "Handlers": {
              "/": {
                "Proxy": "http://127.0.0.1:7878"
              }
            }
          }
        },
        "AllowFunnel": {
          "$${TS_CERT_DOMAIN}:443": ${TS_ALLOW_FUNNEL:-false}
        }
      }
