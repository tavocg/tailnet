services:
  wireguard:
    image: linuxserver/wireguard
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Chicago}
    volumes:
      - ${WG_CONFIG_DIR:-./wg}:/config/wg_confs
    ports:
      - ${WEBUI_PORT:-8080}:${WEBUI_PORT:-8080}
      - ${TORRENTING_PORT:-6881}:${TORRENTING_PORT:-6881}
      - ${TORRENTING_PORT:-6881}:${TORRENTING_PORT:-6881}/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:wireguard"
    depends_on:
      - wireguard
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Chicago}
      - WEBUI_PORT=${WEBUI_PORT:-8080}
      - TORRENTING_PORT=${TORRENTING_PORT:-6881}
    volumes:
      - ${DOWNLOADS_DIR:-./qbittorrent/downloads}:/downloads
      - ${CONFIG_DIR:-config}:/config
      - ${INCOMPLETE_DIR:-incomplete}:/incomplete
    restart: unless-stopped

volumes:
  config:
  incomplete:
