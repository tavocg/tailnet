services:
  ts-pacebin:
    image: tailscale/tailscale:latest
    container_name: ts-pacebin
    restart: unless-stopped
    hostname: ${TS_HOSTNAME}
    environment:
      - TS_AUTHKEY
      - TS_EXTRA_ARGS
      - TS_SERVE_CONFIG=/ts/serve.json
    volumes:
      - tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    configs:
      - source: serve-config
        target: /ts/serve.json
  pacebin:
    build: .
    container_name: pacebin
    network_mode: service:ts-pacebin
    depends_on:
      - ts-pacebin
    volumes:
      - pacebin-data:/pacebin-data
    # Optional: Random seed generated, or use deterministic seed
    #environment:
      #- PB_SECRET
    restart: unless-stopped
volumes:
  pacebin-data:
  tailscale:
configs:
  serve-config:
    content: |
      {
        "TCP": {
          "443": {
            "HTTPS": true
          }
        },
        "Web": {
          "$${TS_CERT_DOMAIN}:443": {
            "Handlers": {
              "/": {
                "Proxy": "http://127.0.0.1:8081"
              }
            }
          }
        },
        "AllowFunnel": {
          "$${TS_CERT_DOMAIN}:443": ${TS_ALLOW_FUNNEL:-false}
        }
      }
